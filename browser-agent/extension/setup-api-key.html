<!DOCTYPE html>
<html>
<head>
    <title>Browser Agent - Configurar API Key</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #4CAF50;
            margin-top: 0;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.success {
            background: #4CAF5022;
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }
        .status.error {
            background: #f4433622;
            border: 2px solid #f44336;
            color: #f44336;
        }
        .status.info {
            background: #2196F322;
            border: 2px solid #2196F3;
            color: #2196F3;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .code {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
            overflow-x: auto;
        }
        .instructions {
            background: #2a2a2a;
            padding: 15px;
            border-left: 4px solid #2196F3;
            margin: 20px 0;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Browser Agent - Configuração</h1>
        
        <div id="status" class="status info">
            Pronto para configurar...
        </div>

        <div class="instructions">
            <h3>📋 Opção 1: Configuração Automática (Recomendado)</h3>
            <p>Use a chave pré-configurada:</p>
            <button onclick="setupWithDefaultKey()">✅ Configurar com Chave Padrão</button>
        </div>

        <div class="instructions">
            <h3>📋 Opção 2: Usar Sua Própria Chave</h3>
            <ol>
                <li>Obtenha sua chave em: <a href="https://makersuite.google.com/app/apikey" target="_blank" style="color: #4CAF50;">Google AI Studio</a></li>
                <li>Cole a chave abaixo:</li>
            </ol>
            <input type="text" id="apiKey" placeholder="Cole sua chave Gemini API aqui (AIza...)">
            <button onclick="setupWithCustomKey()">🔑 Configurar com Minha Chave</button>
        </div>

        <div class="instructions">
            <h3>🔍 Verificar Configuração</h3>
            <button onclick="checkStatus()">📊 Verificar Status</button>
            <button onclick="clearConfig()">🗑️ Limpar Configuração</button>
        </div>

        <div id="details" style="margin-top: 20px;"></div>
    </div>

    <script>
        const DEFAULT_API_KEY = 'AIzaSyBCpJhVl_L6cIQ2eBTxvfab-CK8DZsg6ok';

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function showDetails(html) {
            document.getElementById('details').innerHTML = html;
        }

        async function setupWithDefaultKey() {
            showStatus('⏳ Configurando com chave padrão...', 'info');
            await saveApiKey(DEFAULT_API_KEY);
        }

        async function setupWithCustomKey() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showStatus('❌ Por favor, cole sua chave API', 'error');
                return;
            }
            if (!apiKey.startsWith('AIza')) {
                showStatus('⚠️ Chave parece inválida (deve começar com AIza)', 'error');
                return;
            }
            showStatus('⏳ Configurando com sua chave...', 'info');
            await saveApiKey(apiKey);
        }

        async function saveApiKey(apiKey) {
            try {
                await chrome.storage.local.set({ 
                    geminiApiKey: apiKey,
                    directMode: true 
                });
                
                showStatus('✅ Configuração salva com sucesso!', 'success');
                showDetails(`
                    <div class="code">
                        <strong>✅ Chave API configurada</strong><br>
                        <strong>✅ Modo Direto ativado</strong><br><br>
                        <strong>🔄 Próximos passos:</strong><br>
                        1. Recarregue a extensão em chrome://extensions/<br>
                        2. Abra o Side Panel (clique no ícone da extensão)<br>
                        3. Deve mostrar "🟢 Modo Direto (Gemini API)"<br>
                        4. Digite um comando para testar!
                    </div>
                `);
            } catch (error) {
                showStatus(`❌ Erro ao salvar: ${error.message}`, 'error');
            }
        }

        async function checkStatus() {
            try {
                const result = await chrome.storage.local.get(['geminiApiKey', 'directMode']);
                
                if (result.geminiApiKey) {
                    const keyPreview = result.geminiApiKey.substring(0, 10) + '...';
                    showStatus('✅ Configuração encontrada!', 'success');
                    showDetails(`
                        <div class="code">
                            <strong>Status da Configuração:</strong><br><br>
                            ✅ Chave API: ${keyPreview}<br>
                            ✅ Modo Direto: ${result.directMode ? 'Ativado' : 'Desativado'}<br><br>
                            <strong>Tudo pronto para usar!</strong>
                        </div>
                    `);
                } else {
                    showStatus('⚠️ Nenhuma configuração encontrada', 'error');
                    showDetails(`
                        <div class="code">
                            Por favor, configure a chave API usando uma das opções acima.
                        </div>
                    `);
                }
            } catch (error) {
                showStatus(`❌ Erro ao verificar: ${error.message}`, 'error');
            }
        }

        async function clearConfig() {
            if (!confirm('Tem certeza que deseja limpar a configuração?')) {
                return;
            }
            try {
                await chrome.storage.local.remove(['geminiApiKey', 'directMode']);
                showStatus('🗑️ Configuração limpa', 'info');
                showDetails('');
            } catch (error) {
                showStatus(`❌ Erro ao limpar: ${error.message}`, 'error');
            }
        }

        // Check status on load
        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
