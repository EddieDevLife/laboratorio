<!DOCTYPE html>
<html>
<head>
    <title>Browser Agent - Configurar API Key</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 { color: #4CAF50; margin-top: 0; }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.success { background: #4CAF5022; border: 2px solid #4CAF50; color: #4CAF50; }
        .status.error   { background: #f4433622; border: 2px solid #f44336; color: #f44336; }
        .status.info    { background: #2196F322; border: 2px solid #2196F3; color: #2196F3; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover    { background: #45a049; }
        button:disabled { background: #666; cursor: not-allowed; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .code {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
            overflow-x: auto;
        }
        .instructions {
            background: #2a2a2a;
            padding: 15px;
            border-left: 4px solid #2196F3;
            margin: 20px 0;
        }
        .instructions ol { margin: 10px 0; padding-left: 20px; }
        .instructions li { margin: 8px 0; }
        .warning {
            background: #ff980022;
            border: 2px solid #ff9800;
            color: #ff9800;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Browser Agent - Configuração</h1>

        <div class="warning">
            Nunca compartilhe sua chave API. Ela fica salva apenas localmente no seu Chrome,
            nunca é enviada a nenhum servidor próprio.
        </div>

        <div id="status" class="status info">Pronto para configurar...</div>

        <div class="instructions">
            <h3>Configurar chave API</h3>
            <ol>
                <li>Obtenha sua chave em: <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" style="color: #4CAF50;">Google AI Studio</a></li>
                <li>Cole a chave abaixo:</li>
            </ol>
            <input type="password" id="apiKey" placeholder="Cole sua chave Gemini API aqui (AIza...)" autocomplete="off">
            <button onclick="setupWithCustomKey()">Salvar chave</button>
        </div>

        <div class="instructions">
            <h3>Status</h3>
            <button onclick="checkStatus()">Verificar configuração</button>
            <button onclick="clearConfig()" style="background:#666;">Limpar</button>
        </div>

        <div id="details" style="margin-top: 20px;"></div>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = `status ${type}`;
        }

        function showDetails(html) {
            // Usa textContent onde possível para evitar XSS
            document.getElementById('details').innerHTML = html;
        }

        async function setupWithCustomKey() {
            const input = document.getElementById('apiKey');
            const apiKey = input.value.trim();
            if (!apiKey) {
                showStatus('Por favor, cole sua chave API', 'error');
                return;
            }
            if (!apiKey.startsWith('AIza') && !apiKey.startsWith('sk-') && !apiKey.startsWith('sk-ant-')) {
                showStatus('Chave parece inválida. Verifique o formato.', 'error');
                return;
            }
            showStatus('Salvando chave...', 'info');
            await saveApiKey(apiKey);
            input.value = ''; // Limpar campo após salvar
        }

        async function saveApiKey(apiKey) {
            try {
                await chrome.storage.local.set({
                    gemini_api_key: apiKey,
                    llm_provider: 'gemini',
                });
                showStatus('Chave salva com sucesso!', 'success');
                showDetails(`<div class="code">
                    Chave configurada. Recarregue a extensão e abra o Side Panel.
                </div>`);
            } catch (error) {
                showStatus(`Erro ao salvar: ${String(error)}`, 'error');
            }
        }

        async function checkStatus() {
            try {
                const result = await chrome.storage.local.get(['gemini_api_key', 'anthropic_api_key', 'openai_api_key', 'llm_provider']);
                const hasKey = result.gemini_api_key || result.anthropic_api_key || result.openai_api_key;

                if (hasKey) {
                    showStatus('Configuração encontrada!', 'success');
                    const provider = result.llm_provider ?? '(não definido)';
                    showDetails(`<div class="code">
                        Provider: ${provider}<br>
                        Gemini: ${result.gemini_api_key ? '✓ configurado' : '—'}<br>
                        Anthropic: ${result.anthropic_api_key ? '✓ configurado' : '—'}<br>
                        OpenAI: ${result.openai_api_key ? '✓ configurado' : '—'}
                    </div>`);
                } else {
                    showStatus('Nenhuma chave configurada', 'error');
                }
            } catch (error) {
                showStatus(`Erro ao verificar: ${String(error)}`, 'error');
            }
        }

        async function clearConfig() {
            if (!confirm('Limpar todas as chaves salvas?')) return;
            try {
                await chrome.storage.local.remove(['gemini_api_key', 'anthropic_api_key', 'openai_api_key', 'llm_provider']);
                showStatus('Configuração limpa', 'info');
                document.getElementById('details').textContent = '';
            } catch (error) {
                showStatus(`Erro ao limpar: ${String(error)}`, 'error');
            }
        }

        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
