name: Extension CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: browser-agent/extension/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: browser-agent/extension
      - name: Typecheck
        run: npm run typecheck
        working-directory: browser-agent/extension
      - name: Tests
        run: npm run test:run
        working-directory: browser-agent/extension
      - name: Build
        run: npm run build
        working-directory: browser-agent/extension
